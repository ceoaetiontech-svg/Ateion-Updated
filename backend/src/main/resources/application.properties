spring.application.name=ateion-backend

### Use Environment Variables for everything database-related
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}

spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

youtube.api.key=${YOUTUBE_API_KEY}
# Keeps JWT signing stable across local runs and Render restarts.
app.jwt.secret=${JWT_SECRET}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

### --- FIXED: HikariCP Pooler Settings ---
# Prevents stale connection drops from Supabase
spring.datasource.hikari.max-lifetime=270000
spring.datasource.hikari.connection-timeout=20000
# Spring Boot has its own pool. Keep this small to avoid starving the PgBouncer pool
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.data-source-properties.prepareThreshold=0


spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

### This allows Render to tell Spring Boot which port to use
server.port=${PORT:8080}

### Security and Logging
spring.jpa.open-in-view=false
logging.level.root=INFO
server.error.include-message=never

### Mail Configuration (for password reset — optional, app works without it)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}

### Dynamic Frontend URL (Defaults to localhost if no environment variable is set)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}


logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.oauth2=TRACE
logging.level.org.springframework.web.client=DEBUG