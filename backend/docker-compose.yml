services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ateion
      POSTGRES_USER: ateion
      POSTGRES_PASSWORD: ateion
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ateion"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ateion
      SPRING_DATASOURCE_USERNAME: ateion
      SPRING_DATASOURCE_PASSWORD: ateion
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-ateion-default-secret-key-change-in-production-min32}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
