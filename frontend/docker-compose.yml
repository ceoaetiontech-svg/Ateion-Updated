
services:
  frontend:
    image: node:20-alpine
    # ponytail: run as host user 1000:1000 to prevent root-owned files
    user: "1000:1000"
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    container_name: ateion-frontend
    restart: unless-stopped
