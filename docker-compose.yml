services:
  backend:
    image: maven:3.9.6-eclipse-temurin-17-alpine
    container_name: ateion-backend
    # ponytail: run as host user 1000:1000 to prevent root-owned files
    user: "1000:1000"
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PORT: 8080
      APP_FRONTEND_URL: http://localhost
      MAVEN_CONFIG: /app/.m2
    volumes:
      - ./backend:/app
    working_dir: /app
    command: mvn spring-boot:run -DskipTests -Duser.home=/app

  frontend:
    image: node:20-alpine
    container_name: ateion-frontend
    # ponytail: run as host user 1000:1000 to prevent root-owned files
    user: "1000:1000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    restart: unless-stopped
